<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMS Config Switcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rack">

  <!-- header -->
  <div class="rack-header">
    <h1>LMS CONFIG SWITCHER</h1>
    <div class="led" id="led"></div>
  </div>

  <!-- status -->
  <div class="status-panel">
    <div class="status-label">Last execution</div>
    <div class="status-value" id="statusValue">—</div>
    <div class="status-time" id="statusTime"></div>
  </div>

  <!-- buttons -->
  <div class="button-panel">

    <div class="btn-group">
      <span class="btn-group-label">Linear</span>
      <button class="script-btn" id="btn1" onclick="runScript(1)">
        <span class="btn-label">Gesemann, Linear, 95%</span>
        <span class="btn-status" id="bs1"></span>
      </button>
      <button class="script-btn" id="btn2" onclick="runScript(2)">
        <span class="btn-label">Shibata, Linear, 95%</span>
        <span class="btn-status" id="bs2"></span>
      </button>
      <button class="script-btn" id="btn3" onclick="runScript(3)">
        <span class="btn-label">Low-Shibata, Linear, 95%</span>
        <span class="btn-status" id="bs3"></span>
      </button>
      <button class="script-btn" id="btn4" onclick="runScript(4)">
        <span class="btn-label">High Shibata,Linear, 95%</span>
        <span class="btn-status" id="bs4"></span>
      </button>
      <button class="script-btn" id="btn5" onclick="runScript(5)">
        <span class="btn-label">Lipshitz, Linear, 95%</span>
        <span class="btn-status" id="bs5"></span>
      </button>
      <button class="script-btn" id="btn6" onclick="runScript(6)">
        <span class="btn-label">Improved-e-weighted, Linear, 95%</span>
        <span class="btn-status" id="bs6"></span>
      </button>
      <button class="script-btn" id="btn7" onclick="runScript(7)">
        <span class="btn-label">Modified-e-weighted, Linear, 95%</span>
        <span class="btn-status" id="bs7"></span>
      </button>
      <button class="script-btn" id="btn8" onclick="runScript(8)">
        <span class="btn-label">F-weighted, Linear, 95%</span>
        <span class="btn-status" id="bs8"></span>
      </button>
      <button class="script-btn" id="btn9" onclick="runScript(9)">
        <span class="btn-label">Sloped TPDF, no noise shaping, Linear, 95%</span>
        <span class="btn-status" id="bs9"></span>
      </button>
      <button class="script-btn" id="btn10" onclick="runScript(10)">
        <span class="btn-label">TPDF, no noise shaping, Linear, 95%</span>
        <span class="btn-status" id="bs10"></span>
      </button>
    </div>

    <div class="btn-group">
      <span class="btn-group-label">Minimum</span>
      <button class="script-btn" id="btn11" onclick="runScript(11)">
        <span class="btn-label">Gesemann, Minimum, 95%</span>
        <span class="btn-status" id="bs11"></span>
      </button>
      <button class="script-btn" id="btn12" onclick="runScript(12)">
        <span class="btn-label">Shibata, Minimum, 95%</span>
        <span class="btn-status" id="bs12"></span>
      </button>
      <button class="script-btn" id="btn13" onclick="runScript(13)">
        <span class="btn-label">Low-Shibata, Minimum, 95%</span>
        <span class="btn-status" id="bs13"></span>
      </button>
      <button class="script-btn" id="btn14" onclick="runScript(14)">
        <span class="btn-label">High Shibata,Minimum, 95%</span>
        <span class="btn-status" id="bs14"></span>
      </button>
      <button class="script-btn" id="btn15" onclick="runScript(15)">
        <span class="btn-label">Lipshitz, Minimum, 95%</span>
        <span class="btn-status" id="bs15"></span>
      </button>
      <button class="script-btn" id="btn16" onclick="runScript(16)">
        <span class="btn-label">Improved-e-weighted, Minimum, 95%</span>
        <span class="btn-status" id="bs16"></span>
      </button>
      <button class="script-btn" id="btn17" onclick="runScript(17)">
        <span class="btn-label">Modified-e-weighted, Minimum, 95%</span>
        <span class="btn-status" id="bs17"></span>
      </button>
      <button class="script-btn" id="btn18" onclick="runScript(18)">
        <span class="btn-label">F-weighted, Minimum, 95%</span>
        <span class="btn-status" id="bs18"></span>
      </button>
      <button class="script-btn" id="btn19" onclick="runScript(19)">
        <span class="btn-label">Sloped TPDF, no noise shaping, Minimum, 95%</span>
        <span class="btn-status" id="bs19"></span>
      </button>
      <button class="script-btn" id="btn20" onclick="runScript(20)">
        <span class="btn-label">TPDF, no noise shaping, Minimum, 95%</span>
        <span class="btn-status" id="bs20"></span>
      </button>
    </div>

    <div class="btn-group">
      <span class="btn-group-label">Intermediate</span>
      <button class="script-btn" id="btn21" onclick="runScript(21)">
        <span class="btn-label">Gesemann, Intermediate, 95%</span>
        <span class="btn-status" id="bs21"></span>
      </button>
      <button class="script-btn" id="btn22" onclick="runScript(22)">
        <span class="btn-label">Shibata, Intermediate, 95%</span>
        <span class="btn-status" id="bs22"></span>
      </button>
      <button class="script-btn" id="btn23" onclick="runScript(23)">
        <span class="btn-label">Low-Shibata, Intermediate, 95%</span>
        <span class="btn-status" id="bs23"></span>
      </button>
      <button class="script-btn" id="btn24" onclick="runScript(24)">
        <span class="btn-label">High Shibata,Intermediate, 95%</span>
        <span class="btn-status" id="bs24"></span>
      </button>
      <button class="script-btn" id="btn25" onclick="runScript(25)">
        <span class="btn-label">Lipshitz, Intermediate, 95%</span>
        <span class="btn-status" id="bs25"></span>
      </button>
      <button class="script-btn" id="btn26" onclick="runScript(26)">
        <span class="btn-label">Improved-e-weighted, Intermediate, 95%</span>
        <span class="btn-status" id="bs26"></span>
      </button>
      <button class="script-btn" id="btn27" onclick="runScript(27)">
        <span class="btn-label">Modified-e-weighted, Intermediate, 95%</span>
        <span class="btn-status" id="bs27"></span>
      </button>
      <button class="script-btn" id="btn28" onclick="runScript(28)">
        <span class="btn-label">F-weighted, Intermediate, 95%</span>
        <span class="btn-status" id="bs28"></span>
      </button>
      <button class="script-btn" id="btn29" onclick="runScript(29)">
        <span class="btn-label">Sloped TPDF, no noise shaping, Intermediate, 95%</span>
        <span class="btn-status" id="bs29"></span>
      </button>
      <button class="script-btn" id="btn30" onclick="runScript(30)">
        <span class="btn-label">TPDF, Intermediate, 95%</span>
        <span class="btn-status" id="bs30"></span>
      </button>
    </div>
    <div class="btn-group">
      <span class="btn-group-label">Inne</span>
      <button class="script-btn" id="btn31" onclick="runScript(31)">
        <span class="btn-label">Gesemann, Linear, 90%</span>
        <span class="btn-status" id="bs31"></span>
      </button>
    </div>
</div>

  <!-- footer -->
  <div class="rack-footer">
    <span>NODE / EXPRESS</span>
    <span id="footerTime"></span>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
